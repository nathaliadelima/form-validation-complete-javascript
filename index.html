    <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Validação de Formulário</title>

<style>
body{
    font-family: Arial;
    padding: 30px;
}

input{
    display: block;
    margin-bottom: 10px;
    padding: 8px;
    width: 250px;
}

button{
    padding: 8px 15px;
}
</style>

</head>

<body>

<h1>Cadastro</h1>

<form id="formulario">

<label>Nome</label>
<input type="text" id="nome">

<label>Email</label>
<input type="text" id="email">

<label>Telefone</label>
<input type="text" id="telefone">

<label>Senha</label>
<input type="password" id="senha">

<button type="submit">Enviar</button>

</form>

    <script src="script.js"></script>
</body>
</html>
